        body {

            padding: 20px;

        }
        h1 {
            text-align: center;
            color: #333;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .question {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            background: #0055aa;
            color: white;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        button:hover {
            background: #003f80;
        }
        #resultat {
            margin-top: 25px;
        }
        .etapes {
            list-style-type: decimal;
            padding-left: 20px;
        }
        .etapes li {
            margin-bottom: 8px;
        }
        .hidden {
            display: none;
        }

        // Variable pour suivre l'état actuel de l'arbre
        let currentNode = arbreDecision;
        let history = [];

        // Fonction pour afficher la question actuelle
        function afficherQuestion(node) {
            const questionContainer = document.getElementById('current-question');
            const optionsContainer = document.getElementById('current-options');
            const resultatContainer = document.getElementById('resultat');

            questionContainer.textContent = node.question;

            if (node.options) {
                optionsContainer.innerHTML = '';
                node.options.forEach((option) => {
                    const button = document.createElement('button');
                    button.textContent = option.label;
                    button.onclick = () => repondre(option);
                    optionsContainer.appendChild(button);
                });
                resultatContainer.classList.add('hidden');
            } else if (node.etapes) {
                optionsContainer.innerHTML = '';
                resultatContainer.classList.remove('hidden');
                resultatContainer.innerHTML = `
                    <h2>Votre parcours administratif :</h2>
                    <ol class="etapes">
                        ${node.etapes.map(etape => `<li>${etape}</li>`).join('')}
                    </ol>
                `;
            }
        }

        // Fonction pour gérer la réponse de l'utilisateur
        function repondre(option) {
            history.push(currentNode);
            currentNode = option.next || option;
            afficherQuestion(currentNode);
        }

        // Initialiser l'application
        afficherQuestion(currentNode);
